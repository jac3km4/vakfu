name: PR

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy --no-self-update
      - name: Run clippy
        run: cargo clippy -- -D warnings
